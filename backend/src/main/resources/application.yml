# Set SPRING_DATASOURCE_PASSWORD (and optionally URL/username) in your environment; do not commit real passwords.
# MusicBrainz requires a descriptive User-Agent (app name + contact URL or email).
musicbrainz:
  user-agent: SoundWave/0.1 (https://github.com/example/soundwave)

spring:
  application:
    name: soundwave

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/soundwave}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
